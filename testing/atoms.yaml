      "expected": ["规则写入当前规则组"]
    },
    {
      "id": "U-019",
      "action": "新增 geoip 规则",
      "preconditions": ["当前 active group 存在", "match_value 合法"],
      "expected": ["规则写入当前规则组"]
    },
    {
      "id": "U-020",
      "action": "新增 domain_suffix 规则",
      "preconditions": ["当前 active group 存在", "match_value 合法"],
      "expected": ["规则写入当前规则组"]
    },
    {
      "id": "U-021",
      "action": "新增 domain 规则",
      "preconditions": ["当前 active group 存在", "match_value 合法"],
      "expected": ["规则写入当前规则组"]
    },
    {
      "id": "U-022",
      "action": "新增 ip_cidr 规则",
      "preconditions": ["当前 active group 存在", "match_value 合法"],
      "expected": ["规则写入当前规则组"]
    },
    {
      "id": "U-023",
      "action": "新增 ip_is_private 规则",
      "preconditions": ["当前 active group 存在"],
      "expected": ["规则写入当前规则组", "match_value 按系统规则自动填充"]
    },
    {
      "id": "U-024",
      "action": "新增规则",
      "preconditions": ["当前 active group 存在", "非 ip_is_private 且 match_value 为空"],
      "expected": ["操作失败", "规则不写入"]
    },
    {
      "id": "U-025",
      "action": "删除规则",
      "preconditions": ["目标规则存在"],
      "expected": ["规则从当前规则组中移除"]
    },
    {
      "id": "U-026",
      "action": "删除规则",
      "preconditions": ["目标规则不存在"],
      "expected": ["操作失败或忽略", "其他规则不变"]
    },
    {
      "id": "U-027",
      "action": "修改默认策略为 direct",
      "preconditions": ["当前 active group 存在"],
      "expected": ["默认策略更新为 direct", "新策略被持久化"]
    },
    {
      "id": "U-028",
      "action": "修改默认策略为 proxy",
      "preconditions": ["当前 active group 存在"],
      "expected": ["默认策略更新为 proxy", "新策略被持久化"]
    },
    {
      "id": "U-029",
      "action": "点击连接",
      "preconditions": ["存在有效 active node", "存在有效 active group"],
      "expected": ["连接成功", "代理启动", "状态变为已连接"]
    },
    {
      "id": "U-030",
      "action": "点击连接",
      "preconditions": ["缺少有效 active node"],
      "expected": ["连接失败", "状态保持未连接"]
    },
    {
      "id": "U-031",
      "action": "点击连接",
      "preconditions": ["缺少有效 active group"],
      "expected": ["连接失败", "状态保持未连接"]
    },
    {
      "id": "U-032",
      "action": "点击断开",
      "preconditions": ["当前已连接"],
      "expected": ["连接断开", "代理停止", "状态变为未连接"]
    },
    {
      "id": "U-033",
      "action": "查看首页连接状态",
      "preconditions": ["当前已连接"],
      "expected": ["显示 connected", "显示 active node", "显示 active group", "显示 uptime"]
    },
    {
      "id": "U-034",
      "action": "查看首页连接状态",
      "preconditions": ["当前未连接"],
      "expected": ["显示 disconnected"]
    },
    {
      "id": "U-035",
      "action": "已连接时切换活动节点",
      "preconditions": ["当前已连接", "目标节点存在"],
      "expected": ["运行配置 reload", "连接保持有效", "active node 更新"]
    },
    {
      "id": "U-036",
      "action": "已连接时切换活动规则组",
      "preconditions": ["当前已连接", "目标规则组存在"],
      "expected": ["运行配置 reload", "连接保持有效", "active group 更新"]
    },
    {
      "id": "U-037",
      "action": "已连接时新增规则",
      "preconditions": ["当前已连接", "当前 active group 存在"],
      "expected": ["运行配置 reload", "连接保持有效", "新规则生效"]
    },
    {
      "id": "U-038",
      "action": "已连接时删除规则",
      "preconditions": ["当前已连接", "目标规则存在"],
      "expected": ["运行配置 reload", "连接保持有效", "规则删除生效"]
    },
    {
      "id": "U-039",
      "action": "已连接时修改默认策略",
      "preconditions": ["当前已连接", "当前 active group 存在"],
      "expected": ["运行配置 reload", "连接保持有效", "默认策略生效"]
    },
    {
      "id": "U-040",
      "action": "查看日志",
      "preconditions": [],
      "expected": ["返回当前日志列表"]
    },
    {
      "id": "U-041",
      "action": "清空日志",
      "preconditions": ["当前存在日志"],
      "expected": ["日志被清空"]
    },
    {
      "id": "U-042",
      "action": "查看代理信息",
      "preconditions": [],
      "expected": ["返回监听地址", "返回 HTTP 代理地址", "返回 SOCKS 代理地址", "返回终端命令"]
    },
    {
      "id": "U-043",
      "action": "重启应用",
      "preconditions": ["之前已经保存节点、规则组和 active 配置"],
      "expected": ["节点恢复", "规则组恢复", "active node 恢复", "active group 恢复"]
    },
    {
      "id": "U-044",
      "action": "修正配置后再次点击连接",
      "preconditions": ["之前因配置不足连接失败", "当前已补齐有效 active node 和 active group"],
      "expected": ["连接成功", "状态变为已连接"]
    },
    {
      "id": "U-045",
      "action": "断开后查看首页状态",
      "preconditions": ["刚执行过断开"],
      "expected": ["显示未连接", "运行态已清空"]
    },
    {
      "id": "U-046",
      "action": "连接态下按矩阵切换多个节点与规则组组合",
      "preconditions": ["至少存在两个以上节点", "至少存在两个以上可用规则组", "当前已连接"],
      "expected": ["每次切换后连接保持有效", "active node 与 active group 同步更新", "reload 日志持续追加"]
    },
    {
      "id": "U-047",
      "action": "连接态下核对当前规则组规则集合",
      "preconditions": ["当前 active group 已按预期写入规则"],
      "expected": ["返回规则集合与目标规则类型、match_value、outbound 完全一致"]
    },
    {
      "id": "U-048",
      "action": "删除连接态中的 active node",
      "preconditions": ["当前已连接", "active node 存在其他可回退节点"],
      "expected": ["被删除节点消失", "系统自动切换到有效剩余节点", "连接保持有效"]
    },
    {
      "id": "U-049",
      "action": "删除连接态中的 active group",
      "preconditions": ["当前已连接", "active group 存在其他可回退规则组"],
      "expected": ["被删除规则组消失", "系统自动切换到有效剩余规则组", "连接保持有效"]
    },
    {
      "id": "U-050",
      "action": "连接态下刷新前端 store 全量状态",
      "preconditions": ["已完成多轮节点与规则组切换或回退"],
      "expected": ["store 中的连接状态、节点列表、代理信息与后端保持一致"]
    }
  ]
}
