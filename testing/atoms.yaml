{
  "version": 1,
  "project": "Pingu",
  "description": "JSON-compatible YAML. Each item is a functional atom expressed as user action, preconditions and expected result.",
  "atoms": [
    {
      "id": "U-001",
      "action": "打开应用",
      "preconditions": ["本地无配置"],
      "expected": ["显示空节点", "显示未连接状态", "显示空或默认规则组"]
    },
    {
      "id": "U-002",
      "action": "打开应用",
      "preconditions": ["本地已有配置"],
      "expected": ["加载节点列表", "加载活动节点", "加载活动规则组", "加载连接状态", "加载代理信息"]
    },
    {
      "id": "U-003",
      "action": "导入合法节点 URI",
      "preconditions": ["当前无同名或同配置冲突节点"],
      "expected": ["新节点被保存", "节点出现在节点列表"]
    },
    {
      "id": "U-004",
      "action": "导入非法节点 URI",
      "preconditions": [],
      "expected": ["导入失败", "节点列表不变"]
    },
    {
      "id": "U-005",
      "action": "查看节点列表",
      "preconditions": ["已存在一个或多个节点"],
      "expected": ["返回全部节点"]
    },
    {
      "id": "U-006",
      "action": "设置活动节点",
      "preconditions": ["目标节点存在"],
      "expected": ["active node 更新", "活动节点被持久化"]
    },
    {
      "id": "U-007",
      "action": "设置活动节点",
      "preconditions": ["目标节点不存在"],
      "expected": ["操作失败", "active node 保持不变"]
    },
    {
      "id": "U-008",
      "action": "删除节点",
      "preconditions": ["目标节点存在且不是 active node"],
      "expected": ["节点被删除", "其余节点和状态保持不变"]
    },
    {
      "id": "U-009",
      "action": "删除节点",
      "preconditions": ["目标节点存在且是 active node"],
      "expected": ["节点被删除", "active node 被清空或按系统规则切换"]
    },
    {
      "id": "U-010",
      "action": "创建规则组",
      "preconditions": ["名称合法且非空"],
      "expected": ["新规则组被创建", "规则组被持久化"]
    },
    {
      "id": "U-011",
      "action": "创建规则组",
      "preconditions": ["名称为空或只有空白"],
      "expected": ["创建失败", "规则组列表不变"]
    },
    {
      "id": "U-012",
      "action": "查看规则组列表",
      "preconditions": ["已有一个或多个规则组"],
      "expected": ["返回全部规则组"]
    },
    {
      "id": "U-013",
      "action": "切换活动规则组",
      "preconditions": ["目标规则组存在"],
      "expected": ["active group 更新", "活动规则组被持久化"]
    },
    {
      "id": "U-014",
      "action": "切换活动规则组",
      "preconditions": ["目标规则组不存在"],
      "expected": ["操作失败", "active group 保持不变"]
    },
    {
      "id": "U-015",
      "action": "重命名规则组",
      "preconditions": ["目标规则组存在", "新名称合法且非空"],
      "expected": ["规则组名称更新", "新名称被持久化"]
    },
    {
      "id": "U-016",
      "action": "删除规则组",
      "preconditions": ["目标规则组存在且不是 active group"],
      "expected": ["规则组被删除"]
    },
    {
      "id": "U-017",
      "action": "删除规则组",
